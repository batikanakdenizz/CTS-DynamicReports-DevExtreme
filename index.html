<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LinePulse Custom Report Builder — dinamik rapor oluşturma (DevExtreme, dummy data)" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%233b82f6'/%3E%3Cpath d='M13 3 5 13h5l-1 8 8-10h-5z' fill='white'/%3E%3C/svg%3E"
    />
    <title>LinePulse · Custom Report Builder</title>
    <!-- DevExtreme temaları: rel="dx-theme" linklerini themes modülü yönetir;
         themes.current('fluent.blue.dark') ile çalışma anında geçiş yapılır.
         Dosyalar public/dx/ altında (node_modules/devextreme/dist/css kopyası). -->
    <!-- %BASE_URL% şart: site GitHub Pages'te alt yolda (/CustomReport-DevExtreme/)
         yayınlanıyor; '/dx/...' mutlak yolu orada 404 olurdu. Vite dev'de '/',
         build'de vite.config.js'teki base ile değiştirir. -->
    <link rel="dx-theme" data-theme="fluent.blue.light" href="%BASE_URL%dx/dx.fluent.blue.light.css" data-active="true" />
    <link rel="dx-theme" data-theme="fluent.blue.dark" href="%BASE_URL%dx/dx.fluent.blue.dark.css" data-active="false" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
