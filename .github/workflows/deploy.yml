name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      # npm ci DEĞİL — bilinçli: Windows'ta üretilen package-lock, rolldown'ın
      # Linux/WASM opsiyonel bağımlılık ağacını (@emnapi/*, tam sürüm pinli)
      # kaydedemiyor (npm'in cross-platform optional-deps kısıtı); npm ci
      # Ubuntu'da EUSAGE ile düşüyor. npm install lockfile aralıklarına uyar.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
